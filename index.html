<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resonance</title>
  <style>
    body {
      margin: 0;
      font-family: 'Rajdhani' sans-serif;
      background: #0f1115;
      color: #f5f5f5;
      text-align: center;
      padding: 40px 20px;
    }

    .hero {
      max-width: 700px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .flyer {
      display: block;
      width: 100%;
      max-width: 460px;
      height: auto;
      margin: 0 auto;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .pulse {
      max-width: 460px;
      margin: 30px auto 0;
      padding: 24px;
      background: #171a20;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .pulse h2 {
      margin: 0 0 12px;
      font-size: 1.5rem;
      color: #f5f5f5;
      text-align: left;
    }

    .pulse-text {
      margin: 0 0 20px;
      font-size: 0.98rem;
      line-height: 1.6;
      color: #cfcfcf;
      text-align: left;
    }

    .pulse-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .pulse-form label {
      font-size: 0.9rem;
      color: #d8d8d8;
      text-align: left;
    }

    .pulse-form input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      background: #0f1115;
      color: #f5f5f5;
      font-size: 1rem;
      box-sizing: border-box;
    }

    .pulse-form button {
      margin-top: 8px;
      padding: 14px 18px;
      border: none;
      border-radius: 10px;
      background: #c9a15d;
      color: #111;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }


    
  </style>
</head>
<body>
  <section class="hero">
   
    <img
      class="flyer"
      src="./ResonanceFlyer.jpeg"
      alt="Resonance Event Flyer"
      width="535"
      height="801"
    />
  </section>

   <section class="pulse">
    <h2>Pulse Rewards</h2>
    <p class="pulse-text">
      Earn rewards for showing up, sharing the vibe, and staying connected.
    </p>

    <form class="pulse-form">
      <label for="first-name">First name</label>
      <input type="text" id="first-name" name="first_name" />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" />

      <label for="social-handle">Instagram or social handle</label>
      <input type="text" id="social-handle" name="social_handle" />

      <button type="submit">Start Earning</button>
    </form>
  </section>

  <section class="pulse">
    ...
  </section>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const supabaseUrl = 'https://ainvcprlrjekflorznxl.supabase.co'
    const supabaseKey = 'sb_publishable_loafUyxLPmOAJn80NHy3uQ_i10Iah6M'
    const supabase = createClient(supabaseUrl, supabaseKey)

    const form = document.querySelector('.pulse-form')

    form.addEventListener('submit', async (event) => {
      event.preventDefault()

      const first_name = document.getElementById('first-name').value.trim()
      const email = document.getElementById('email').value.trim()
      const social_handle = document.getElementById('social-handle').value.trim()

      const { error } = await supabase
        .from('pulse_rewards_signups')
        .insert([{ first_name, email, social_handle }])

      if (error) {
        alert('There was a problem. Please try again.')
        return
      }

      alert('You are in. Start earning.')
      form.reset()
    })
  </script>
</body>
</html>

  
  
</body>
</html>
