<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resonance</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #f5f5f5;
      text-align: center;
      padding: 40px 20px;
    }

    .hero {
      max-width: 700px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .flyer {
      display: block;
      width: 100%;
      max-width: 460px;
      height: auto;
      margin: 0 auto;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }
  </style>
</head>
<body>
  <section class="hero">
   
    <img
      class="flyer"
      src="./ResonanceFlyer.jpeg"
      alt="Resonance Event Flyer"
      width="535"
      height="801"
    />
  </section>

   <section class="pulse">
    <h2>Pulse Rewards</h2>
    <p class="pulse-text">
      Earn rewards for showing up, sharing the vibe, and staying connected.
    </p>

    <form class="pulse-form">
      <label for="first-name">First name</label>
      <input type="text" id="first-name" name="first_name" />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" />

      <label for="social-handle">Instagram or social handle</label>
      <input type="text" id="social-handle" name="social_handle" />

      <button type="submit">Start Earning</button>
    </form>
  </section>
  
</body>
</html>
